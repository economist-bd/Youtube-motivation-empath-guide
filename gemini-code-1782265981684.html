<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>অর্ধ-বার্ষিক পরীক্ষার প্রশ্নপত্র</title>
    <style>
        body { font-family: 'SolaimanLipi', Arial, sans-serif; line-height: 1.6; margin: 40px; }
        h1 { text-align: center; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 5px; margin-top: 30px; }
        .question { margin-bottom: 15px; font-weight: bold; }
        .options { margin-left: 20px; list-style-type: none; }
        .answer { color: green; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>অর্ধ-বার্ষিক পরীক্ষার প্রশ্নপত্র</h1>

    <!-- এখানে আপনার প্রতিটি বিষয়ের প্রশ্নগুলো যোগ করতে হবে -->
    <h2>বিষয়: গণিত (নমুনা প্রশ্ন)</h2>
    <div class="question">১. নিচের কোনটি মৌলিক সংখ্যা?</div>
    <ul class="options">
        <li>ক) ৯</li>
        <li>খ) ১৫</li>
        <li>গ) ৪৩</li>
        <li>ঘ) ৫১</li>
    </ul>
    <div class="answer">উত্তর: গ) ৪৩</div>

    <!-- এভাবে আপনি অন্যান্য বিষয়ের প্রশ্নগুলো এখানে যোগ করবেন -->
    
    <p><em>দ্রষ্টব্য: এই ফাইলটি আপনি যেকোনো ব্রাউজারে ওপেন করে প্রিন্ট করতে পারবেন।</em></p>

</body>
</html>
